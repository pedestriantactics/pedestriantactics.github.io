---
layout: default
title: Index
---

<div class="contentgrid">
    {% for post in site.posts %}
    <div class="contentcontainer">
        <a class="post-link" href="{{ post.url }}">
            <img src="{{ post.image }}">
            <h4>{{ post.title }}</h4>
        </a>
    </div>
    {% endfor %}
</div>
